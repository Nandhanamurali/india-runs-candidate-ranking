ai_usage_summary: |
  Used Claude for architecture design discussion, code review, debugging, and
  guidance throughout the build process. All code was reviewed, tested, and
  validated by me at each step against real sample data before scaling to the
  full 100K dataset. No candidate data was sent to any external LLM API.

methodology_summary: |
  Hybrid 3-layer ranking system. Layer 1: rule-based feature extraction directly
  encoding the JD's explicit disqualifiers (consulting-only backgrounds, pure
  research with no production deployment, non-engineering titles, title-chasing
  patterns) plus positive evidence signals (vector DB/hybrid search experience,
  ranking evaluation framework experience). Layer 2: semantic similarity using
  sentence-transformers (all-MiniLM-L6-v2) comparing JD meaning against each
  candidate's full profile text, precomputed offline for all 100K candidates.
  Layer 3: honeypot suspicion scoring combining multiple weak signals (skill
  duration/proficiency mismatches, career date overlaps, verification
  inconsistencies) into a single penalty, validated to produce 0% suspicious
  profiles in the final top 100. All three layers combine into one composite
  score; reasoning text is generated directly from extracted facts (no LLM
  call at ranking time, eliminating hallucination risk). Final ranking step
  runs in under 35 seconds on CPU.

